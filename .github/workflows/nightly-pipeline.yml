name: QA Nightly & Full Stress Pipeline

on:
  schedule:
    - cron: '0 2 * * *' # Run at 2:00 AM every night
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [ main, master ] # Run full suite when code actually merges to main

jobs:
  test:
    name: Run Full QA + Stress Suite
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Get Playwright Version
      id: playwright-version
      run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

    - name: Cache Playwright Browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps chromium

    - name: Install Playwright OS Dependencies
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps chromium

    - name: Run Full Pipeline (Including @stress and @network)
      run: npx playwright test
      env:
        NODE_ENV: test
        CI: true
        STRESS_RUN: 'true' # Custom flag to limit workers in playwright.config.ts for heavy stress

    - name: Upload QA Intelligence Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: nightly-qa-artifacts
        path: test-artifacts/
        retention-days: 14
