name: QA PR Pipeline (Fast)

on:
  pull_request:
    branches: [ main, master, redesign ]

jobs:
  test:
    name: Run Fast QA Pipeline
    timeout-minutes: 20 # Must be fast!
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Get Playwright Version
      id: playwright-version
      run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

    - name: Cache Playwright Browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps chromium

    - name: Install Playwright OS Dependencies
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps chromium

    - name: Run Fast Pipeline (@smoke, @integration, @a11y)
      # Specifically excludes @stress and heavy tests
      run: npx playwright test --grep "@smoke|@integration|@a11y"
      env:
        NODE_ENV: test
        CI: true

    - name: Upload QA Intelligence Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pr-qa-artifacts
        path: test-artifacts/
        retention-days: 7
