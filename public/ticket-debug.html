<!DOCTYPE html>
<html>
<head><title>Ticket Download Debug</title></head>
<body style="background:#0a0a0a;color:#fff;font-family:sans-serif;padding:40px">
<h1>Ticket Download Debug</h1>
<p>Click each button to test different download methods:</p>

<button id="btn1" style="padding:12px 24px;margin:8px;background:#ff6b1a;border:none;color:#000;font-weight:bold;cursor:pointer">
  Method 1: fetch + blob + createObjectURL
</button>
<br/>
<button id="btn2" style="padding:12px 24px;margin:8px;background:#8dcdff;border:none;color:#000;font-weight:bold;cursor:pointer">
  Method 2: window.open (direct)
</button>
<br/>
<button id="btn3" style="padding:12px 24px;margin:8px;background:#ffb596;border:none;color:#000;font-weight:bold;cursor:pointer">
  Method 3: hidden iframe
</button>

<pre id="log" style="background:#1a1a1a;padding:16px;margin-top:20px;border:1px solid #333;white-space:pre-wrap;"></pre>

<script>
const BOOKING_ID = 'HH-2026-000013';
const API_URL = `/api/generate-ticket?bookingId=${BOOKING_ID}`;
const log = document.getElementById('log');

function addLog(msg) {
  log.textContent += new Date().toISOString().slice(11,23) + ' | ' + msg + '\n';
  console.log(msg);
}

// Method 1: fetch + blob
document.getElementById('btn1').addEventListener('click', async () => {
  addLog('Method 1: Starting fetch...');
  try {
    const res = await fetch(API_URL);
    addLog('Method 1: Status=' + res.status + ', Content-Type=' + res.headers.get('content-type'));
    
    if (!res.ok) {
      addLog('Method 1: FAILED - Status ' + res.status);
      return;
    }

    const blob = await res.blob();
    addLog('Method 1: Blob created - size=' + blob.size + ', type=' + blob.type);

    if (blob.size === 0) {
      addLog('Method 1: ERROR - Blob is EMPTY (0 bytes)!');
      return;
    }

    // Read first 5 bytes
    const ab = await blob.slice(0, 5).arrayBuffer();
    const header = new TextDecoder().decode(ab);
    addLog('Method 1: First 5 bytes="' + header + '" (should be %PDF-)');

    const url = URL.createObjectURL(blob);
    addLog('Method 1: ObjectURL=' + url);

    const a = document.createElement('a');
    a.href = url;
    a.download = `DEBUG-TICKET-${BOOKING_ID}.pdf`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    addLog('Method 1: Click triggered, waiting 3s to revoke...');
    
    setTimeout(() => {
      URL.revokeObjectURL(url);
      addLog('Method 1: URL revoked');
    }, 3000);
  } catch (err) {
    addLog('Method 1: EXCEPTION - ' + err.message);
  }
});

// Method 2: window.open
document.getElementById('btn2').addEventListener('click', () => {
  addLog('Method 2: Opening ' + API_URL + ' in new tab...');
  window.open(API_URL, '_blank');
});

// Method 3: hidden iframe
document.getElementById('btn3').addEventListener('click', () => {
  addLog('Method 3: Using iframe download...');
  const iframe = document.createElement('iframe');
  iframe.style.display = 'none';
  iframe.src = API_URL;
  document.body.appendChild(iframe);
  setTimeout(() => iframe.remove(), 10000);
  addLog('Method 3: iframe attached');
});
</script>
</body>
</html>
